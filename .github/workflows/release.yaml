name: goreleaser

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Create venv
        run: python -m venv venv

      - name: Activate venv and install dependencies
        run: |
          source venv/bin/activate
          pip install --upgrade pip
          pip install pyinstaller numpy==2.3.2 h5py==3.14.0 rosettasciio==0.10.0 sparse==0.17.0

      - name: Build extractor binary
        run: |
          pyinstaller --onefile --name=extractor_bin extractor/__main__.py \
            --hidden-import=numpy.core._multiarray_umath \
            --hidden-import=numpy.core._multiarray \
            --collect-all=numpy
          rm -rf build/
          rm *.spec

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
