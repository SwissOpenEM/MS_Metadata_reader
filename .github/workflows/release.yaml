name: goreleaser

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-python-binary:
    runs-on: ubuntu-latest
    container: alpine:3.19
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache \
            git \
            python3 \
            python3-dev \
            py3-pip \
            py3-virtualenv \
            gcc \
            g++ \
            gfortran \
            musl-dev \
            linux-headers \
            libffi-dev \
            hdf5-dev \
            openblas-dev \
            lapack-dev \
            llvm-dev \
            llvm17-static \
            cmake \
            make

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Python version
        run: python3 --version

      - name: Create venv
        run: python3 -m venv ms_extractor

      - name: Activate venv and install dependencies
        run: |
          source ms_extractor/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Build extractor binary
        run: |
          source ms_extractor/bin/activate
          pyinstaller --onefile --name=extractor_bin extractor/__main__.py
          rm -rf build/
          rm *.spec

      - name: Upload Python binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-binary
          path: dist/extractor_bin
          retention-days: 1

  goreleaser:
    if: github.actor != 'github-actions[bot]'
    needs: build-python-binary
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Python binary
        uses: actions/download-artifact@v4
        with:
          name: python-binary
          path: dist/

      - name: Make binary executable
        run: chmod +x dist/extractor_bin

      - name: Verify binary exists for GoReleaser
        run: |
          if [ ! -f "dist/extractor_bin" ]; then
            echo "Error: dist/extractor_bin not found!"
            exit 1
          fi
          echo "Binary verified: $(file dist/extractor_bin)"
          echo "Binary size: $(ls -lh dist/extractor_bin)"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
