name: goreleaser

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.3"

      - name: Create venv
        run: python -m venv venv

      - name: Activate venv and install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Build extractor binary
        run: |
          source venv/bin/activate
          pyinstaller --onefile --name=extractor_bin extractor/__main__.py
            # --hidden-import=numpy.core._multiarray_umath \
            # --hidden-import=numpy.core._multiarray \
            # --collect-all=numpy
          rm -rf build/
          rm *.spec

      - name: Commit autogenerated binary
        run: |
          set -e
          git lfs install
          git lfs track "dist/extractor_bin"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git lfs install
          git lfs track "dist/extractor_bin"
          git add .gitattributes
          git commit -m "Track extractor_bin with Git LFS"
          git add dist/extractor_bin
          git commit -m "Generate python executable"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
